version: '3.8'

services:

  mysql:
    image: mysql:8
    container_name: espocrm-mysql
    environment:
      MYSQL_ROOT_PASSWORD: PASSWORD
      MYSQL_DATABASE: espocrm
      MYSQL_USER: espocrm
      MYSQL_PASSWORD: PASSWORD
    volumes:
      - mysql:/var/lib/mysql
      - ./mysql-conf:/etc/mysql/conf.d   # ← custom config mounted here
    restart: always

  espocrm:
    image: espocrm/espocrm
    container_name: espocrm
    environment:
      PHP_FPM_MAX_CHILDREN: 10   # reduce if your DB is small
      ESPOCRM_DATABASE_PLATFORM: Mysql
      ESPOCRM_DATABASE_HOST: espocrm-mysql
      ESPOCRM_DATABASE_USER: espocrm
      ESPOCRM_DATABASE_PASSWORD: PASSWORD
      ESPOCRM_ADMIN_USERNAME: USER
      ESPOCRM_ADMIN_PASSWORD: PASSWORD
      ESPOCRM_SITE_URL: "URL"
      ESPOCRM_TIME_ZONE: Europe/Berlin
    volumes:
      - espocrm:/var/www/html
    restart: always
    ports:
      - 8680:80

  espocrm-daemon:
    image: espocrm/espocrm
    container_name: espocrm-daemon
    volumes:
      - espocrm:/var/www/html
    restart: always
    entrypoint: docker-daemon.sh

  espocrm-websocket:
    image: espocrm/espocrm
    container_name: espocrm-websocket
    environment:
      ESPOCRM_CONFIG_USE_WEB_SOCKET: "true"
      ESPOCRM_CONFIG_WEB_SOCKET_URL: "ws://localhost:8081"
      ESPOCRM_CONFIG_WEB_SOCKET_ZERO_M_Q_SUBSCRIBER_DSN: "tcp://*:7777"
      ESPOCRM_CONFIG_WEB_SOCKET_ZERO_M_Q_SUBMISSION_DSN: "tcp://espocrm-websocket:7777"
    volumes:
      - espocrm:/var/www/html
    restart: always
    entrypoint: docker-websocket.sh
    ports:
      - 8081:8080

volumes:
  mysql:
  espocrm:
